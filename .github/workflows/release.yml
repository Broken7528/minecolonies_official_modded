name: Build and Release Modpack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build modpack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Read pack metadata
        id: pack
        run: |
          set -euo pipefail
          NAME=$(awk -F' *= *' '/^name *=/ {gsub(/"/, "", $2); print $2; exit}' pack.toml)
          VERSION=$(awk -F' *= *' '/^version *=/ {gsub(/"/, "", $2); print $2; exit}' pack.toml)
          MC=$(awk -F' *= *' '/^minecraft *=/ {gsub(/"/, "", $2); print $2; exit}' pack.toml)
          NEOFORGE=$(awk -F' *= *' '/^neoforge *=/ {gsub(/"/, "", $2); print $2; exit}' pack.toml)
          BASE="${NAME}-${VERSION}"
          TAG="v${VERSION}-${GITHUB_RUN_NUMBER}"
          {
            echo "name=${NAME}"
            echo "version=${VERSION}"
            echo "mc=${MC}"
            echo "neoforge=${NEOFORGE}"
            echo "tag=${TAG}"
            echo "base=${BASE}"
            echo "cfzip=${BASE}-client-curseforge.zip"
            echo "server=${BASE}-server.zip"
          } >>"$GITHUB_OUTPUT"
          echo "::notice::Building ${NAME} ${VERSION} (MC ${MC}, NeoForge ${NEOFORGE})"

      - name: Refresh packwiz index
        run: packwiz refresh

      # ---------- CLIENT BUILD ----------

      - name: Export client (CurseForge .zip)
        run: packwiz curseforge export -o "${{ steps.pack.outputs.cfzip }}"

      # ---------- SERVER (bootstrap: nothing bundled, NeoForge + mods fetched on launch) ----------

      - name: Download packwiz-installer-bootstrap
        run: |
          set -euo pipefail
          BOOTSTRAP_VERSION="0.0.3"
          curl -fsSL -o packwiz-installer-bootstrap.jar \
            "https://github.com/packwiz/packwiz-installer-bootstrap/releases/download/v${BOOTSTRAP_VERSION}/packwiz-installer-bootstrap.jar"

      - name: Build server zip
        env:
          OUT: ${{ steps.pack.outputs.server }}
          MC: ${{ steps.pack.outputs.mc }}
          NEOFORGE: ${{ steps.pack.outputs.neoforge }}
          PACK_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/pack.toml
        run: |
          set -euo pipefail
          mkdir -p server
          cp packwiz-installer-bootstrap.jar server/

          NEOFORGE_INSTALLER_URL="https://maven.neoforged.net/releases/net/neoforged/neoforge/${NEOFORGE}/neoforge-${NEOFORGE}-installer.jar"

          cat > server/start.sh <<EOF
          #!/usr/bin/env bash
          set -e
          # 1. Install the NeoForge server on first launch (creates run.sh + libraries/).
          if [ ! -f run.sh ]; then
            echo "Installing NeoForge ${NEOFORGE} server..."
            curl -fsSL -o neoforge-installer.jar "${NEOFORGE_INSTALLER_URL}"
            java -jar neoforge-installer.jar --installServer
          fi
          # 2. Sync mods + configs from the pack.
          java -jar packwiz-installer-bootstrap.jar -g -s server "${PACK_URL}"
          # 3. Launch.
          ./run.sh nogui
          EOF
          chmod +x server/start.sh

          cat > server/start.bat <<EOF
          @echo off
          if not exist run.bat (
            echo Installing NeoForge ${NEOFORGE} server...
            curl -fsSL -o neoforge-installer.jar "${NEOFORGE_INSTALLER_URL}"
            java -jar neoforge-installer.jar --installServer
            if errorlevel 1 goto :end
          )
          java -jar packwiz-installer-bootstrap.jar -g -s server "${PACK_URL}"
          if errorlevel 1 goto :end
          call run.bat nogui
          :end
          pause
          EOF

          cat > server/eula.txt <<'EOF'
          # By changing this to true you agree to the Mojang EULA: https://aka.ms/MinecraftEULA
          eula=false
          EOF

          cat > server/README.txt <<EOF
          Server for ${{ steps.pack.outputs.name }} ${{ steps.pack.outputs.version }}

          Requirements: Java 21.

          On launch, start.sh / start.bat will:
            1. Install NeoForge ${NEOFORGE} (first run only)
            2. Sync mods + configs from ${PACK_URL}
            3. Launch the NeoForge server

          Set eula=true in eula.txt before running.
          EOF

          (cd server && zip -r "../${OUT}" .)

      # ---------- RELEASE ----------

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pack.outputs.tag }}
          name: ${{ steps.pack.outputs.name }} ${{ steps.pack.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build of **${{ steps.pack.outputs.name }}** from commit ${{ github.sha }}.

            - Minecraft: ${{ steps.pack.outputs.mc }}
            - NeoForge: ${{ steps.pack.outputs.neoforge }}

            **Pick your download:**

            All artifacts are metadata-only — mod jars are fetched from their
            original Modrinth / CurseForge URLs at install/launch time, so no
            mods are redistributed.

            | File | For | Notes |
            |---|---|---|
            | `*-client-curseforge.zip` | CurseForge / Overwolf launcher, Prism, ATLauncher, MultiMC | Client pack |
            | `*-server.zip` | Self-hosted server | `start.sh` / `start.bat` installs NeoForge + syncs mods on first launch |

            Servers: requires Java 21. Set `eula=true` in `eula.txt` before running `start.sh` / `start.bat`.
          files: |
            ${{ steps.pack.outputs.cfzip }}
            ${{ steps.pack.outputs.server }}
